name: "Common airport Checkin"

on:
  schedule:
    - cron: "10 16 * * *"  # scheduled at 00:10 (UTC+8) everyday
  workflow_dispatch:

env:
  RUN_ENV: 'prod'

jobs:
  build:
    runs-on: ubuntu-latest
    # if: github.ref == 'refs/heads/master'

    steps:
      - name: Checkout master
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          # ref: master

      - name: Set up python
        uses: actions/setup-python@v6
        with:
          python-version: 3.10.16

      - name: Random sleep
        if: github.event_name == 'schedule'
        run: sleep $(shuf -i 10-60 -n 1)

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Fetch latest geeked solver
        run: |
          git clone https://github.com/xKiian/GeekedTest.git temp_geeked
          python -c "
          with open('temp_geeked/geeked/sign.py', 'r', encoding='utf-8') as f:
              code = f.read()
          code = code.replace('from geeked.slide import SlideSolver', 'SlideSolver = None')
          code = code.replace('from geeked.gobang import GobangSolver', 'GobangSolver = None')
          code = code.replace('from geeked.icon import IconSolver', 'IconSolver = None')
          with open('temp_geeked/geeked/sign.py', 'w', encoding='utf-8') as f:
              f.write(code)
          "
          mv temp_geeked/geeked ./geeked
          rm -rf temp_geeked
      - name: Run sign
        env:
          URL: ${{ secrets.URL }}
          SCKEY: ${{ secrets.SCKEY }}
          EMAIL: ${{ secrets.EMAIL }}
          PASSWD: ${{ secrets.PASSWD }}
          CONFIG: ${{ secrets.CONFIG }}
        run: |
          python3 ./main.py
